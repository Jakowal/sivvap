<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <title>Wiki</title>
    <style>
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('./OpenDyslexic-Regular.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('./OpenDyslexic-Bold.otf') format('opentype');
        font-weight: bold;
        font-style: normal;
      }
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('./OpenDyslexic-Italic.otf') format('opentype');
        font-weight: normal;
        font-style: italic;
      }
      @font-face {
        font-family: 'OpenDyslexic';
        src: url('./OpenDyslexic-BoldItalic.otf') format('opentype');
        font-weight: bold;
        font-style: italic;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 100vw;
        min-height: 100vh;
        font-family: 'OpenDyslexic';
        letter-spacing: -0.14em;
        background: #131213;
        color: var(--text-dark);
        background-image: url('./background.png');
        background-repeat: repeat-x;
        background-color: var(--bg-base, #131213);
        background-size: max(50%, 800px);
        background-attachment: fixed;
      }

    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
